# Netlify configuration for the Aditya Indra Bayu portfolio.
# Vite + React + Framer Motion, statically pre-rendered with vite-react-ssg.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[build.processing.html]
  pretty_urls = true

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    Content-Type = "image/png"

[[headers]]
  for = "/og-image.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
    Content-Type = "image/svg+xml"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
    Content-Type = "image/svg+xml"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

# Skip publishing harness files that don't belong on the live site
[[redirects]]
  from = "/.claude/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/PRODUCT.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/DESIGN.md"
  to = "/404.html"
  status = 404
  force = true
