# Netlify configuration for the Aditya Indra Bayu portfolio.
# Static site, no build step.

[build]
  publish = "."
  # No command — index.html is shipped as-is.

# Ignore harness / preview config that lives in .claude/
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Skip publishing harness files that don't belong on the live site
[[redirects]]
  from = "/.claude/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/PRODUCT.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/DESIGN.md"
  to = "/404.html"
  status = 404
  force = true
