<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="0.32" cy="0.36" r="0.95">
      <stop offset="0%"   stop-color="#1f5057"/>
      <stop offset="40%"  stop-color="#143a40"/>
      <stop offset="80%"  stop-color="#0a2528"/>
      <stop offset="100%" stop-color="#06181b"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.28" cy="0.42" r="0.55">
      <stop offset="0%"   stop-color="#2d7a83" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2d7a83" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle horizon line for editorial weight -->
  <line x1="80" y1="540" x2="1120" y2="540"
        stroke="#fafafa" stroke-opacity="0.10" stroke-width="1"/>

  <!-- top label row -->
  <g font-family="Segoe UI, Arial, sans-serif" font-weight="600"
     font-size="20" letter-spacing="2"
     fill="#fafafa" fill-opacity="0.78">
    <rect x="80" y="86" width="14" height="14" fill="#7fc3c9"/>
    <text x="108" y="100">VENTURE BUILDER · FRACTIONAL CMO</text>
  </g>

  <!-- name (display) -->
  <text x="80" y="270" font-family="Segoe UI, Arial, sans-serif"
        font-size="120" font-weight="700" letter-spacing="-5"
        fill="#fafafa">Aditya Indra Bayu</text>

  <!-- hero line in brand-mint accent -->
  <text x="80" y="380" font-family="Segoe UI, Arial, sans-serif"
        font-size="46" font-weight="500" letter-spacing="-1.2"
        fill="#85d3d9">I start, operate, and scale</text>
  <text x="80" y="440" font-family="Segoe UI, Arial, sans-serif"
        font-size="46" font-weight="500" letter-spacing="-1.2"
        fill="#85d3d9">ventures across industries.</text>

  <!-- footer row -->
  <g font-family="Segoe UI, Arial, sans-serif"
     font-size="22" font-weight="400"
     fill="#fafafa" fill-opacity="0.62">
    <text x="80" y="585">aditya-bayu.netlify.app</text>
    <text x="1120" y="585" text-anchor="end">10 ventures · 5 industries · 1 operator</text>
  </g>
</svg>
